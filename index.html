<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart GSM</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background:#f5f6fa;
}

/* HEADER */
header {
    background:#0f172a;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* GRID */
.container {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card {
    background:white;
    border-radius:16px;
    padding:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover {
    transform:translateY(-5px);
}

.card img {
    width:100%;
    height:140px;
    object-fit:contain;
}

.price {
    font-size:18px;
    font-weight:bold;
    margin:8px 0;
}

.btn {
    background:#0d6efd;
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    width:100%;
}

/* BOTON CARRITO */
#abrirCarrito {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#0f172a;
    color:white;
    border:none;
    padding:16px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
}

#contador {
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:white;
    font-size:12px;
    padding:3px 6px;
    border-radius:50%;
}

/* PANEL */
.panel {
    position:fixed;
    right:0;
    top:0;
    width:350px;
    height:100%;
    background:white;
    box-shadow:-5px 0 20px rgba(0,0,0,0.2);
    padding:15px;
    transform:translateX(100%);
    transition:0.3s;
    display:flex;
    flex-direction:column;
}

.panel.activo {transform:translateX(0);}

/* OVERLAY */
#overlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
}

#overlay.activo {display:block;}

.item {
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    border-bottom:1px solid #eee;
    padding-bottom:5px;
}

.controls button {
    padding:3px 8px;
}

.total {
    margin-top:auto;
    font-size:20px;
    font-weight:bold;
}

/* BOTONES */
.btn2 {
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.whatsapp {background:#25D366;color:white;}
.vaciar {background:#dc3545;color:white;}
.ver {background:#111;color:white;}

</style>
</head>

<body>

<header>📱 Smart GSM</header>

<div id="overlay" onclick="cerrarPanel()"></div>

<button id="abrirCarrito" onclick="togglePanel()">
🛒 <span id="contador">0</span>
</button>

<div class="container" id="productos"></div>

<!-- PANEL -->
<div class="panel" id="panel">
<h3>🧾 Pedido</h3>
<div id="lista"></div>

<div class="total">Total: Bs <span id="total">0</span></div>

<button class="btn2 ver" onclick="generar()">👁 Ver Pedido</button>
<button class="btn2 vaciar" onclick="vaciar()">🗑 Vaciar</button>
<button class="btn2 whatsapp" onclick="enviar()">📲 WhatsApp</button>
</div>

<script>
let cart = {};
let timer;

/* PRODUCTOS */
const productos = [
["IPHONE 15 128GB",6019],
["IPHONE 16 128GB",7037],
["POCO F8 PRO",4848],
["POCO X8 PRO",3648],
["INFINIX GT 30 PRO",3264],
["REALME 14 PRO+",3792],
["HONOR X8D",2256]
];

/* GENERAR */
let html="";
productos.forEach(p=>{
html+=`
<div class="card">
<img src="https://via.placeholder.com/150">
<p>${p[0]}</p>
<p class="price">Bs ${p[1].toLocaleString()}</p>
<button class="btn" onclick="add('${p[0]}',${p[1]})">Agregar</button>
</div>`;
});
document.getElementById("productos").innerHTML=html;

/* FUNCIONES */
function add(nombre, precio){
if(!cart[nombre]) cart[nombre]={precio:precio,cantidad:1};
else cart[nombre].cantidad++;

render();
abrirPanelAuto();
}

function abrirPanelAuto(){
togglePanel(true);

clearTimeout(timer);
timer=setTimeout(()=>{
cerrarPanel();
},3000);
}

function cambiar(nombre,val){
cart[nombre].cantidad+=val;
if(cart[nombre].cantidad<=0) delete cart[nombre];
render();
}

function render(){
let html="";
let total=0;
let cantidad=0;

for(let i in cart){
let p=cart[i];
let subtotal=p.precio*p.cantidad;
total+=subtotal;
cantidad+=p.cantidad;

html+=`
<div class="item">
<div>${i}</div>

<div class="controls">
<button onclick="cambiar('${i}',-1)">−</button>
${p.cantidad}
<button onclick="cambiar('${i}',1)">+</button>
</div>

<div>Bs ${subtotal.toLocaleString()}</div>
</div>`;
}

document.getElementById("lista").innerHTML=html;
document.getElementById("total").innerText=total.toLocaleString();
document.getElementById("contador").innerText=cantidad;
}

function vaciar(){cart={};render();}

function togglePanel(force){
const panel=document.getElementById("panel");
const overlay=document.getElementById("overlay");

if(force===true){
panel.classList.add("activo");
overlay.classList.add("activo");
return;
}

panel.classList.toggle("activo");
overlay.classList.toggle("activo");
}

function cerrarPanel(){
document.getElementById("panel").classList.remove("activo");
document.getElementById("overlay").classList.remove("activo");
}

function enviar(){
let txt="🛒 PEDIDO SMART GSM%0A%0A";
let total=0;

for(let i in cart){
let p=cart[i];
txt+=`📱 ${i} x${p.cantidad}%0A`;
total+=p.precio*p.cantidad;
}

txt+=`%0ATotal Bs ${total}`;
window.open("https://wa.me/59170341190?text="+txt);
}

function generar(){
alert("Función de imagen lista para mejorar 😏");
}
</script>

</body>
</html>
