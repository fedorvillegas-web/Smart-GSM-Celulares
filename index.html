<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart GSM</title>

<style>
body {margin:0;font-family:'Segoe UI',Arial;background:#f6f7fb;}

header {
background:#0f172a;color:white;padding:15px;
display:flex;flex-direction:column;gap:10px;
}

.topbar {display:flex;justify-content:space-between;align-items:center;}

input {
padding:8px;border-radius:8px;border:none;width:200px;
}

/* FILTROS PRO */
#filtros {display:flex;gap:8px;flex-wrap:wrap;}

#filtros button {
background:white;
border:1px solid #d1d5db;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-size:13px;
font-weight:500;
transition:all 0.25s ease;
}

#filtros button:hover {
background:#000;
color:white;
border-color:#000;
transform:scale(1.05);
}

#filtros button.activo {
background:#000;
color:white;
border-color:#000;
}

/* PRODUCTOS */
.container {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:20px;
}

.card {
background:white;border-radius:16px;padding:15px;
text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.08);
position:relative;
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
transform: scale(1.05);
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* AGOTADO PRO */
.card.agotado {
filter: grayscale(100%) brightness(0.85);
}

.badge {
position:absolute;top:10px;left:10px;
background:#dc3545;color:white;
padding:4px 8px;border-radius:6px;font-size:12px;
}

.card img {
width:100%;height:140px;object-fit:contain;
transition: transform 0.3s ease;
}

.card:hover img {transform: scale(1.1);}

.price {font-weight:bold;margin:8px 0;font-size:18px;}

.btn {
background:#0d6efd;color:white;border:none;
padding:10px;border-radius:10px;width:100%;cursor:pointer;margin-top:5px;
}

.buy {background:#25D366;}

/* CARRITO */
#abrirCarrito {
position:fixed;bottom:20px;right:20px;
background:#000;color:white;border:none;
padding:18px;border-radius:50%;
font-size:22px;z-index:999;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

#contador {
position:absolute;top:-5px;right:-5px;
background:red;color:white;font-size:12px;
padding:3px 6px;border-radius:50%;
}

.panel {
position:fixed;right:0;top:0;width:350px;height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:15px;
transform:translateX(100%);
transition:0.3s;
display:flex;flex-direction:column;
z-index:1000;
}
.panel.activo {transform:translateX(0);}

#overlay {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;
z-index:999;
}
#overlay.activo {display:block;}

.item {
display:flex;justify-content:space-between;
align-items:center;background:#f9fafb;
padding:8px;border-radius:10px;margin:8px 0;
}

.controls button {
background:#e5e7eb;border:none;
padding:4px 8px;border-radius:6px;
cursor:pointer;
}

.footer-carrito {margin-top:auto;padding-top:10px;}

.total {font-size:20px;font-weight:bold;margin-bottom:10px;}

.btn2 {
width:100%;padding:12px;border:none;
border-radius:10px;margin-top:5px;
cursor:pointer;font-size:14px;
}

.whatsapp {background:#25D366;color:white;}
.vaciar {background:#dc3545;color:white;}
.ver {background:#0d6efd;color:white;}

</style>
</head>

<body>

<header>
<div class="topbar">
<div>📱 Smart GSM</div>
<input type="text" id="buscador" placeholder="Buscar...">
</div>

<div id="filtros">
<button onclick="filtrar('')" class="activo">Todos</button>
<button onclick="filtrar('apple')">Apple</button>
<button onclick="filtrar('xiaomi')">Xiaomi</button>
<button onclick="filtrar('honor')">Honor</button>
<button onclick="filtrar('realme')">Realme</button>
<button onclick="filtrar('tecno')">Tecno</button>
<button onclick="filtrar('infinix')">Infinix</button>
</div>
</header>

<div id="overlay" onclick="cerrarPanel()"></div>

<button id="abrirCarrito" onclick="togglePanel()">
🛒 <span id="contador">0</span>
</button>

<div class="container" id="productos"></div>

<div class="panel" id="panel">
<h3>🧾 Pedido</h3>
<div id="lista"></div>

<div class="footer-carrito">
<div class="total">💰 Total: Bs <span id="total">0</span></div>

<button class="btn2 ver" onclick="verPedido()">🧾 Ver pedido</button>
<button class="btn2 whatsapp" onclick="enviar()">📲 WhatsApp</button>
<button class="btn2 vaciar" onclick="vaciar()">🗑 Vaciar</button>
</div>
</div>

];

function mostrar(lista){
let html="";
lista.forEach(p=>{
let img = p[3] ? p[3] : "img/default.png";

html+=`
<div class="card ${p[2] ? 'agotado' : ''}">
${p[2]?'<div class="badge">❌ AGOTADO</div>':''}
<img src="${img}">
<p>${p[0]}</p>
<p class="price">Bs ${p[1].toLocaleString()}</p>

${p[2] ? `
<button class="btn" disabled>Sin stock</button>
<button class="btn buy" disabled>No disponible</button>
` : `
<button class="btn" onclick="add('${p[0]}',${p[1]})">Agregar</button>
<button class="btn buy" onclick="comprar('${p[0]}',${p[1]})">Comprar ahora</button>
`}
</div>`;
});
document.getElementById("productos").innerHTML=html;
}

mostrar(productos);

/* FILTRO CORREGIDO */
function filtrar(marca){
if(!marca){mostrar(productos);return;}

let filtrado = productos.filter(p => 
p[0].toLowerCase().includes(marca.toLowerCase())
);

mostrar(filtrado);
}

/* BOTON ACTIVO */
document.querySelectorAll("#filtros button").forEach(btn=>{
btn.addEventListener("click", function(){
document.querySelectorAll("#filtros button").forEach(b=>b.classList.remove("activo"));
this.classList.add("activo");
});
});

document.getElementById("buscador").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
let filtrado=productos.filter(p=>p[0].toLowerCase().includes(val));
mostrar(filtrado);
});

function add(n,p){
if(!cart[n]) cart[n]={precio:p,cantidad:1};
else cart[n].cantidad++;
render();
}

function render(){
let html="",total=0,cant=0;

for(let i in cart){
let p=cart[i];
let sub=p.precio*p.cantidad;
total+=sub;
cant+=p.cantidad;

html+=`
<div class="item">
<div>${i}</div>
<div class="controls">
<button onclick="cambiar('${i}',-1)">-</button>
${p.cantidad}
<button onclick="cambiar('${i}',1)">+</button>
</div>
<div>Bs ${sub.toLocaleString()}</div>
</div>`;
}

document.getElementById("lista").innerHTML=html;
document.getElementById("total").innerText=total.toLocaleString();
document.getElementById("contador").innerText=cant;
}

function cambiar(n,v){
cart[n].cantidad+=v;
if(cart[n].cantidad<=0) delete cart[n];
render();
}

function comprar(n,p){
let txt = `🛒 *SMART GSM*

Hola, quiero comprar:

📱 ${n}
💰 Precio: Bs ${p.toLocaleString()}

¿Está disponible?`;

let url = "https://wa.me/59170341190?text=" + encodeURIComponent(txt);
window.open(url, "_blank");
}

function vaciar(){cart={};render();}

function togglePanel(){
document.getElementById("panel").classList.toggle("activo");
document.getElementById("overlay").classList.toggle("activo");
}

function cerrarPanel(){
document.getElementById("panel").classList.remove("activo");
document.getElementById("overlay").classList.remove("activo");
}

function enviar(){
let txt="🛒 PEDIDO SMART GSM%0A%0A";
let total=0;

for(let i in cart){
let p=cart[i];
txt+=`📱 ${i} x${p.cantidad}%0A`;
total+=p.precio*p.cantidad;
}

txt+=`%0ATotal Bs ${total}`;
window.open("https://wa.me/59170341190?text="+txt);
}

function verPedido(){
let txt="🧾 RESUMEN%0A%0A";
let total=0;

for(let i in cart){
let p=cart[i];
txt+=`${i} x${p.cantidad} = Bs ${p.precio*p.cantidad}%0A`;
total+=p.precio*p.cantidad;
}

txt+=`%0ATotal: Bs ${total}`;
alert(decodeURIComponent(txt));
}
</script>

</html>
