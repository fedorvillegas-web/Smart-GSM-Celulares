<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart GSM</title>

<style>
body {margin:0;font-family:'Segoe UI',Arial;background:#f6f7fb;}

header {
background:#0f172a;color:white;padding:15px;
display:flex;flex-direction:column;gap:10px;
}

.topbar {display:flex;justify-content:space-between;align-items:center;}

input {
padding:8px;border-radius:8px;border:none;width:200px;
}

#filtros {display:flex;gap:6px;flex-wrap:wrap;}
#filtros button {
background:#e5e7eb;border:none;padding:6px 10px;
border-radius:8px;cursor:pointer;font-size:12px;
}
#filtros button:hover {background:#0d6efd;color:white;}

.container {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:20px;
}

.card {
background:white;border-radius:16px;padding:15px;
text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.08);
position:relative;
}

.badge {
position:absolute;top:10px;left:10px;
background:#dc3545;color:white;
padding:4px 8px;border-radius:6px;font-size:12px;
}

.card img {width:100%;height:140px;object-fit:contain;}

.price {font-weight:bold;margin:8px 0;font-size:18px;}

.btn {
background:#0d6efd;color:white;border:none;
padding:10px;border-radius:10px;width:100%;cursor:pointer;margin-top:5px;
}

.buy {background:#25D366;}

#abrirCarrito {
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;border:none;
padding:18px;border-radius:50%;
font-size:22px;z-index:999;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#contador {
position:absolute;top:-5px;right:-5px;
background:red;color:white;font-size:12px;
padding:3px 6px;border-radius:50%;
}

.panel {
position:fixed;right:0;top:0;width:350px;height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:15px;
transform:translateX(100%);
transition:0.3s;
display:flex;flex-direction:column;
z-index:1000;
}
.panel.activo {transform:translateX(0);}

#overlay {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;
z-index:999;
}
#overlay.activo {display:block;}

.item {
display:flex;justify-content:space-between;
align-items:center;background:#f9fafb;
padding:8px;border-radius:10px;margin:8px 0;
}

.controls button {
background:#e5e7eb;border:none;
padding:4px 8px;border-radius:6px;
cursor:pointer;
}

.footer-carrito {
margin-top:auto;
padding-top:10px;
}

.total {
font-size:20px;font-weight:bold;margin-bottom:10px;
}

.btn2 {
width:100%;
padding:12px;border:none;
border-radius:10px;margin-top:5px;
cursor:pointer;font-size:14px;
}

.whatsapp {background:#25D366;color:white;}
.vaciar {background:#dc3545;color:white;}
.ver {background:#0d6efd;color:white;}

</style>
</head>

<body>

<header>
<div class="topbar">
<div>📱 Smart GSM</div>
<input type="text" id="buscador" placeholder="Buscar...">
</div>

<div id="filtros">
<button onclick="filtrar('')">Todos</button>
<button onclick="filtrar('APPLE')">Apple</button>
<button onclick="filtrar('XIAOMI')">Xiaomi</button>
<button onclick="filtrar('HONOR')">Honor</button>
<button onclick="filtrar('REALME')">Realme</button>
<button onclick="filtrar('TECNO')">Tecno</button>
<button onclick="filtrar('INFINIX')">Infinix</button>
</div>
</header>

<div id="overlay" onclick="cerrarPanel()"></div>

<button id="abrirCarrito" onclick="togglePanel()">
🛒 <span id="contador">0</span>
</button>

<div class="container" id="productos"></div>

<div class="panel" id="panel">
<h3>🧾 Pedido</h3>
<div id="lista"></div>

<div class="footer-carrito">
<div class="total">💰 Total: Bs <span id="total">0</span></div>

<button class="btn2 ver" onclick="verPedido()">🧾 Ver pedido</button>
<button class="btn2 whatsapp" onclick="enviar()">📲 WhatsApp</button>
<button class="btn2 vaciar" onclick="vaciar()">🗑 Vaciar</button>
</div>
</div>

<script>
let cart={};

let productos=[
["ALCATEL 3T 10 SMART 2/32",672,false],
["APPLE IPHONE 15 128GB",6019,true],
["APPLE IPHONE 16 128GB",7037,false],
["APPLE IPHONE 17 256GB",8774,true],
["APPLE IPHONE 17 PRO MAX 256GB",13632,true],
["APPLE IPHONE AIR 256GB",9024,false],
["HONOR MAGIC 8 LITE 8/256",3120,true],
["HONOR PAD X7 4/128",1190,false],
["HONOR PAD X8A 4/128",1488,false],
["HONOR X5C PLUS 4/256",1190,true],
["HONOR X6C 8/256",1526,false],
["HONOR X7D 6/256",1738,false],
["HONOR X7D 8/256",1882,true],
["HONOR X8D 8/256",2256,true],
["HONOR X8D 8/512",2554,false],
["INFINIX GT 30 PRO 12/512",3264,true],
["INFINIX HOT 60 PRO+ 8/256",1920,false],
["INFINIX NOTE 50 PRO 8/256",2131,true],
["INFINIX NOTE 50S 5G 8/256",2112,false],
["INFINIX NOTE 50X 8/256",1728,false],
["REALME 14 PRO+ 5G 12/512",3792,true],
["REALME 14T 8/256",2016,false],
["REALME C71 8/256",1421,false],
["REALME C85 8/256",1958,true],
["REALME NOTE 70 4/128",1037,false],
["REALME NOTE 70 8/256",1286,false],
["TECNO POVA CURVE 2 5G",2774,true],
["TECNO POVA 7 4G 8/256",1757,false],
["TECNO POVA 7 5G 8/256",2189,true],
["TECNO SPARK GO 3 4/64",835,false],
["TECNO SPARK GO 3 4/128",922,false],
["XIAOMI PAD 7 PRO 8/256",4320,true],
["XIAOMI PAD MINI 12/512",4656,false],
["XIAOMI POCO F8 PRO 12/256",4848,true],
["XIAOMI POCO F8 ULTRA 12/256",6768,true],
["XIAOMI POCO M7 PRO 12/512",2256,false],
["XIAOMI POCO M8 5G 8/512",2371,false],
["XIAOMI POCO M8 PRO 5G 12/512",3254,true],
["XIAOMI POCO M8 PRO 5G 8/256",2832,false],
["XIAOMI POCO PAD 8/256",2256,false],
["XIAOMI POCO PAD M1 8/256",2678,false],
["XIAOMI POCO PAD X1 8/512",3312,true],
["XIAOMI POCO X7 PRO 5G 12/512",3379,true],
["XIAOMI POCO X8 PRO 8/256",3053,false],
["XIAOMI POCO X8 PRO 12/512",3648,true],
["XIAOMI POCO X8 PRO MAX 12/512",4512,true],
["XIAOMI REDMI 15C 4/128",989,false],
["XIAOMI REDMI 15C 4/256",1085,false]
];

function mostrar(lista){
let html="";
lista.forEach(p=>{
let img=`https://source.unsplash.com/300x300/?${p[0]},smartphone`;

html+=`
<div class="card">
${p[2]?'<div class="badge">🔥 OFERTA</div>':''}
<img src="${img}">
<p>${p[0]}</p>
<p class="price">Bs ${p[1].toLocaleString()}</p>

<button class="btn" onclick="add('${p[0]}',${p[1]})">Agregar</button>
<button class="btn buy" onclick="comprar('${p[0]}',${p[1]})">Comprar ahora</button>
</div>`;
});
document.getElementById("productos").innerHTML=html;
}

mostrar(productos);

function filtrar(marca){
if(!marca){mostrar(productos);return;}
let filtrado=productos.filter(p=>p[0].includes(marca));
mostrar(filtrado);
}

document.getElementById("buscador").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
let filtrado=productos.filter(p=>p[0].toLowerCase().includes(val));
mostrar(filtrado);
});

function add(n,p){
if(!cart[n]) cart[n]={precio:p,cantidad:1};
else cart[n].cantidad++;
render();
}

function render(){
let html="",total=0,cant=0;

for(let i in cart){
let p=cart[i];
let sub=p.precio*p.cantidad;
total+=sub;
cant+=p.cantidad;

html+=`
<div class="item">
<div>${i}</div>
<div class="controls">
<button onclick="cambiar('${i}',-1)">-</button>
${p.cantidad}
<button onclick="cambiar('${i}',1)">+</button>
</div>
<div>Bs ${sub.toLocaleString()}</div>
</div>`;
}

document.getElementById("lista").innerHTML=html;
document.getElementById("total").innerText=total.toLocaleString();
document.getElementById("contador").innerText=cant;
}

function cambiar(n,v){
cart[n].cantidad+=v;
if(cart[n].cantidad<=0) delete cart[n];
render();
}

function comprar(n,p){
let txt = `🛒 *SMART GSM*

Hola, quiero comprar:

📱 ${n}
💰 Precio: Bs ${p.toLocaleString()}

¿Está disponible?`;

let url = "https://wa.me/59170341190?text=" + encodeURIComponent(txt);

window.open(url, "_blank");
}
  
function vaciar(){cart={};render();}

function togglePanel(){
document.getElementById("panel").classList.toggle("activo");
document.getElementById("overlay").classList.toggle("activo");
}

function cerrarPanel(){
document.getElementById("panel").classList.remove("activo");
document.getElementById("overlay").classList.remove("activo");
}

function enviar(){
let txt="🛒 PEDIDO SMART GSM%0A%0A";
let total=0;

for(let i in cart){
let p=cart[i];
txt+=`📱 ${i} x${p.cantidad}%0A`;
total+=p.precio*p.cantidad;
}

txt+=`%0ATotal Bs ${total}`;
window.open("https://wa.me/59170341190?text="+txt);
}

function verPedido(){
let txt="🧾 RESUMEN%0A%0A";
let total=0;

for(let i in cart){
let p=cart[i];
txt+=`${i} x${p.cantidad} = Bs ${p.precio*p.cantidad}%0A`;
total+=p.precio*p.cantidad;
}

txt+=`%0ATotal: Bs ${total}`;
alert(decodeURIComponent(txt));
}
</script>

</body>
</html>
