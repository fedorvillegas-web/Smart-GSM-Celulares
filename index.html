<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart GSM</title>

<style>
body {margin:0;font-family:'Segoe UI',Arial;background:#f6f7fb;}

header {
background:#0f172a;color:white;padding:15px;
display:flex;flex-direction:column;gap:10px;
}

.topbar {display:flex;justify-content:space-between;align-items:center;}

input {padding:8px;border-radius:8px;border:none;width:200px;}

#filtros {display:flex;gap:8px;flex-wrap:wrap;}

#filtros button {
background:white;border:1px solid #d1d5db;
padding:8px 14px;border-radius:20px;
cursor:pointer;font-size:13px;
transition:0.25s;
}

#filtros button:hover {background:#000;color:white;}

.container {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:20px;
}

.card {
background:white;border-radius:16px;padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
position:relative;
transition:0.3s;
}

.card:hover {transform:scale(1.05);}

.card.agotado {filter:grayscale(100%) brightness(0.85);}

.badge {
position:absolute;top:10px;left:10px;
background:#dc3545;color:white;
padding:4px 8px;border-radius:6px;font-size:12px;
}

.card img {width:100%;height:140px;object-fit:contain;}

.price {font-weight:bold;font-size:18px;margin:8px 0;}

.btn {
background:#0d6efd;color:white;border:none;
padding:10px;border-radius:10px;width:100%;
cursor:pointer;margin-top:5px;
}

.buy {background:#25D366;}

.panel {
position:fixed;right:0;top:0;width:350px;height:100%;
background:white;padding:15px;
transform:translateX(100%);
transition:0.3s;
display:flex;flex-direction:column;
overflow-y:auto;
}

.panel.activo {transform:translateX(0);}

.vendedores button {
width:100%;margin-top:8px;
padding:12px;border:none;border-radius:12px;
color:white;font-weight:bold;cursor:pointer;
transition:0.2s;
}

.vendedores button:hover {transform:scale(1.03);}

.fedor{background:linear-gradient(45deg,#25D366,#128C7E);}
.eliana{background:linear-gradient(45deg,#111,#444);}
.pamela{background:linear-gradient(45deg,#6f42c1,#9b59b6);}
.judith{background:linear-gradient(45deg,#ff6b81,#ff9ff3);}
.fabiola{background:linear-gradient(45deg,#ff9f43,#ff6b6b);}
.janine{background:linear-gradient(45deg,#0984e3,#74b9ff);}

#abrirCarrito {
position:fixed;bottom:20px;right:20px;
background:black;color:white;
padding:18px;border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<div class="topbar">
<div>📱 Smart GSM</div>
<input id="buscador" placeholder="Buscar...">
</div>

<div id="filtros">
<button onclick="filtrar('')">Todos</button>
<button onclick="filtrar('apple')">Apple</button>
<button onclick="filtrar('xiaomi')">Xiaomi</button>
<button onclick="filtrar('honor')">Honor</button>
<button onclick="filtrar('realme')">Realme</button>
<button onclick="filtrar('tecno')">Tecno</button>
<button onclick="filtrar('infinix')">Infinix</button>
<button onclick="toggleAgotados()">Ocultar agotados</button>
</div>
</header>

<button id="abrirCarrito" onclick="togglePanel()">🛒</button>

<div class="container" id="productos"></div>

<div class="panel" id="panel">
<h3>🧾 Pedido</h3>
<div id="lista"></div>
<div><b>Total Bs <span id="total">0</span></b></div>

<div class="vendedores">
<button class="fedor" onclick="enviarA('Fedor','59170341190')">Fedor</button>
<button class="eliana" onclick="enviarA('Eliana','59165391513')">Eliana</button>
<button class="pamela" onclick="enviarA('Pamela','59165391518')">Pamela</button>

function mostrar(lista=productos){
let html="";
lista.forEach(p=>{
if(ocultar && p[2]) return;

html+=`
<div class="card ${p[2]?'agotado':''}">
${p[2]?'<div class="badge">AGOTADO</div>':''}
<p>${p[0]}</p>
<p class="price">Bs ${p[1].toLocaleString()}</p>
${p[2]?
'<button disabled>Sin stock</button>' :
`<button class="btn" onclick="add('${p[0]}',${p[1]})">Agregar</button>`}
</div>`;
});
document.getElementById("productos").innerHTML=html;
}

mostrar();

function toggleAgotados(){
ocultar=!ocultar;
mostrar();
}

document.getElementById("buscador").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
mostrar(productos.filter(p=>p[0].toLowerCase().includes(val)));
});

function filtrar(m){
if(!m) return mostrar();
mostrar(productos.filter(p=>p[0].toLowerCase().includes(m)));
}

function add(n,p){
if(!cart[n]) cart[n]={precio:p,cantidad:1};
else cart[n].cantidad++;
render();
}

function render(){
let html="",total=0;
for(let i in cart){
let p=cart[i];
total+=p.precio*p.cantidad;
html+=`${i} x${p.cantidad}<br>`;
}
document.getElementById("lista").innerHTML=html;
document.getElementById("total").innerText=total.toLocaleString();
}

function enviarA(nombre,num){
let txt="🛒 Pedido:%0A";
for(let i in cart){
let p=cart[i];
txt+=`${i} x${p.cantidad}%0A`;
}
window.open(`https://wa.me/${num}?text=${txt}`);
}

function togglePanel(){
document.getElementById("panel").classList.toggle("activo");
}
