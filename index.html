<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart GSM</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

/* HEADER */
header {
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

/* BOTON CARRITO */
#abrirCarrito {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111;
    color:white;
    border:none;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    z-index:1000;
}

/* PRODUCTOS */
.container {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
    padding:15px;
}

.card {
    background:white;
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.card img {
    width:100%;
    height:140px;
    object-fit:contain;
}

.btn {
    background:#0d6efd;
    color:white;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* PANEL OCULTO */
.panel {
    position:fixed;
    right:0;
    top:0;
    width:340px;
    height:100%;
    background:white;
    box-shadow:-3px 0 10px rgba(0,0,0,0.2);
    padding:15px;
    display:flex;
    flex-direction:column;

    transform: translateX(100%);
    transition:0.3s;
}

/* PANEL ACTIVO */
.panel.activo {
    transform: translateX(0);
}

.top {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cerrar {
    background:#eee;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}

.vaciar {
    background:#eee;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-left:5px;
}

.item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
}

.controls button {
    padding:3px 8px;
}

/* TOTAL */
.total {
    margin-top:auto;
    font-size:20px;
    font-weight:bold;
}

/* BOTONES */
.btn2 {
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

.imgPedido {
    background:#ddd;
}

.whatsapp {
    background:#25D366;
    color:white;
}
</style>
</head>

<body>

<header>📱 Smart GSM</header>

<!-- BOTON -->
<button id="abrirCarrito" onclick="togglePanel()">🛒</button>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/150">
<p>POCO M8 PRO 12/512</p>
<p>Bs 3254</p>
<button class="btn" onclick="add('POCO M8 PRO 12/512',3254)">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>POCO M8 PRO 8/256</p>
<p>Bs 2832</p>
<button class="btn" onclick="add('POCO M8 PRO 8/256',2832)">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>POCO PAD 8/256</p>
<p>Bs 2256</p>
<button class="btn" onclick="add('POCO PAD 8/256',2256)">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>POCO PAD M1 8/256</p>
<p>Bs 2678</p>
<button class="btn" onclick="add('POCO PAD M1 8/256',2678)">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>POCO PAD X1 8/512</p>
<p>Bs 3312</p>
<button class="btn" onclick="add('POCO PAD X1 8/512',3312)">Agregar</button>
</div>

</div>

<!-- PANEL -->
<div class="panel" id="panel">

<div class="top">
<h3>🧾 MI PEDIDO</h3>
<div>
<button class="vaciar" onclick="vaciar()">Vaciar</button>
<button class="cerrar" onclick="togglePanel()">❌</button>
</div>
</div>

<div id="lista"></div>

<div class="total">Total: Bs <span id="total">0</span></div>

<button class="btn2 imgPedido" onclick="generar()">📸 Generar Imagen</button>
<button class="btn2 whatsapp" onclick="enviar()">ENVIAR WHATSAPP</button>

</div>

<script>
let cart = {};

function add(nombre, precio){
    if(!cart[nombre]){
        cart[nombre] = {precio:precio,cantidad:1};
    } else cart[nombre].cantidad++;

    render();

    // abre automáticamente
    document.getElementById("panel").classList.add("activo");
}

function cambiar(nombre, val){
    cart[nombre].cantidad += val;
    if(cart[nombre].cantidad<=0) delete cart[nombre];
    render();
}

function vaciar(){
    cart = {};
    render();
}

function render(){
    let html="";
    let total=0;

    for(let item in cart){
        let p=cart[item];
        total+=p.precio*p.cantidad;

        html+=`
        <div class="item">
            ${item}
            <div class="controls">
                <button onclick="cambiar('${item}',-1)">-</button>
                ${p.cantidad}
                <button onclick="cambiar('${item}',1)">+</button>
            </div>
        </div>`;
    }

    document.getElementById("lista").innerHTML=html;
    document.getElementById("total").innerText=total;
}

function togglePanel(){
    document.getElementById("panel").classList.toggle("activo");
}

function enviar(){
    let txt="Pedido:%0A";
    let total=0;

    for(let i in cart){
        let p=cart[i];
        txt+=`- ${i} x${p.cantidad}%0A`;
        total+=p.precio*p.cantidad;
    }

    txt+="Total Bs "+total;

    window.open("https://wa.me/59170341190?text="+txt);
}

/* IMAGEN */
function generar(){
    let c=document.createElement("canvas");
    c.width=320;
    c.height=400;
    let ctx=c.getContext("2d");

    ctx.fillStyle="white";
    ctx.fillRect(0,0,320,400);

    ctx.fillStyle="black";
    ctx.font="18px Arial";
    ctx.fillText("SMART GSM",90,30);

    let y=70;
    let total=0;

    for(let i in cart){
        let p=cart[i];
        ctx.fillText(i+" x"+p.cantidad,10,y);
        y+=25;
        total+=p.precio*p.cantidad;
    }

    ctx.fillText("Total Bs "+total,10,y+20);

    let img = c.toDataURL();

    let w = window.open("");
    w.document.write("<img src='"+img+"'/>");
}
</script>

</body>
</html>
